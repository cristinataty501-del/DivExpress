<html lang="pt"><head>
<meta charset="UTF-8">
<title>Comprovativo</title>

<style>
.box{
    width: 60%;
    margin: 40px auto;
    padding: 20px;
    border: 1px solid #ccc;
    font-family: Arial;
    background: #fff;
}

h2, h3{
    text-align:center;
}

.total{
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
}

.btn{
    padding: 10px 15px;
    margin-top: 10px;
    border: none;
    cursor: pointer;
    color: white;
}

.print{ background: green; }
.download{ background: blue; }
.send{ background: orange; }
</style>
</head>

<body>

<div class="box">

    <h2>📄 Comprovativo de pagamento</h2>

    <!-- CLIENTE -->
    <p><b>Cliente:</b> Toy Simao</p>
    <p><b>Email:</b> toy@gmail.com</p>
    <p><b>Telefone:</b> 923344556</p>
    <p><b>Endereço:</b> Luanda , Talatona - 123</p>
    <p><b>Data:</b> 08-Jun-2026</p>

    <hr>

    <!-- PRODUTOS -->
    <p><b>Produtos:</b> bones (16)</p>

    <div class="total">
        Total: 8.000,00 Kz
    </div>

    <hr>

    <!-- VENDEDOR -->
    <h3>👨‍💼 Dados do Vendedor</h3>

    <p><b>IBAN:</b> AO06 0006 0000 70768961301 75</p>
    <p><b>Multicaixa Express:</b> 928884069</p>

    <hr>

    <!-- BOTÕES -->
    <button class="btn print" onclick="window.print()">🖨 Imprimir</button>

    <button class="btn download" onclick="baixarFatura()">⬇ Baixar Fatura</button>

    <!-- ENVIAR AO ADMIN -->
    <form method="POST">
        <input type="hidden" name="order_id" value="62">
        <input type="hidden" name="admin_id" value="24">

        <button type="submit" name="send_admin" class="btn send">
            📤 Enviar comprovativo ao vendedor
        </button>
    </form>

</div>

<script>
function baixarFatura(){
    const conteudo = document.documentElement.outerHTML;
    const blob = new Blob([conteudo], { type: "text/html" });

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "fatura_62.html";
    link.click();
}
</script>


</body></html>
